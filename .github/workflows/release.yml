name: Build, Publish & Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write        # create releases + tags
  packages: write        # push to GHCR
  pull-requests: read

jobs:
  release:
    # Only run when a PR is actually merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      # ---- Checkout ----
      - name: Checkout code
        uses: actions/checkout@v4

      # ---- Determine version from package.json ----
      - name: Read version from package.json
        id: pkg
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      # ---- Setup Node & Build (verify it compiles) ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build TypeScript
        run: npm run build

      # ---- Docker: Login to GHCR ----
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ---- Docker: Build & Push ----
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.pkg.outputs.tag }}
            ghcr.io/${{ github.repository }}:sha-${{ steps.pkg.outputs.short_sha }}
          labels: |
            org.opencontainers.image.title=study-companion-mcp
            org.opencontainers.image.version=${{ steps.pkg.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Create GitHub Release ----
      - name: Generate release notes
        id: notes
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_BODY="${{ github.event.pull_request.body }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_URL="${{ github.event.pull_request.html_url }}"

          cat <<EOF > release-notes.md
          ## What's Changed

          Merged PR #${PR_NUMBER}: **${PR_TITLE}**
          ${PR_URL}

          ${PR_BODY:-_No description provided._}

          ## Docker Image

          \`\`\`bash
          docker pull ghcr.io/${{ github.repository }}:${{ steps.pkg.outputs.tag }}
          \`\`\`

          ### Run with docker-compose (includes ChromaDB)
          \`\`\`bash
          docker compose up -d chromadb
          docker compose run --rm study-companion
          \`\`\`

          ### Run standalone
          \`\`\`bash
          docker run --rm -i -v ./data:/app/data ghcr.io/${{ github.repository }}:${{ steps.pkg.outputs.tag }}
          \`\`\`

          ## MCP Config

          \`\`\`json
          {
            "mcpServers": {
              "study-companion": {
                "command": "docker",
                "args": ["run", "--rm", "-i", "-v", "./data:/app/data", "ghcr.io/${{ github.repository }}:${{ steps.pkg.outputs.tag }}"]
              }
            }
          }
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pkg.outputs.tag }}
          name: "Release ${{ steps.pkg.outputs.tag }}"
          body_path: release-notes.md
          draft: false
          prerelease: false
          make_latest: true
